<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Connect the Dots ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet" />
    <style>
      :root {
        --green: #58cc02; --green-shadow: #58a700;
        --blue: #1cb0f6; --blue-shadow: #1899d6;
        --orange: #ff9600; --orange-shadow: #cc6f00;
        --ink: #3c3c3c; --grey: #e5e5e5;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0; min-height: 100%;
        font-family: "Nunito", system-ui, sans-serif; font-weight: 800;
        color: var(--ink); background: #fff;
        -webkit-user-select: none; user-select: none;
      }
      #app { max-width: 720px; margin: 0 auto; padding: 12px; min-height: 100vh; display: flex; flex-direction: column; gap: 10px; }
      header { padding: 8px 12px; border-bottom: 2px solid var(--grey); text-align: center; }
      h1 { margin: 0; font-size: clamp(20px, 4vw, 28px); font-weight: 900; }
      .sub { color: #888; font-size: 14px; margin-top: 4px; }
      #stars { font-size: 18px; min-height: 22px; display: inline-block; margin-top: 4px; color: #666; font-weight: 800; }

      .stage {
        width: 100%; max-width: 540px; margin: 0 auto;
        aspect-ratio: 1/1;
      }
      svg { width: 100%; height: 100%; touch-action: manipulation; display: block; }

      .dot {
        fill: #fff; stroke: var(--blue); stroke-width: 0.7;
        cursor: pointer;
        transition: fill .2s, stroke .2s;
      }
      .dot.next {
        fill: #fff8c4; stroke: var(--orange); stroke-width: 1.0;
        animation: pulse 1.1s ease-in-out infinite;
        transform-origin: center; transform-box: fill-box;
      }
      .dot.done { fill: var(--green); stroke: var(--green-shadow); }
      .dot.shake { animation: shake .35s ease; transform-box: fill-box; }
      @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.18); } }
      @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-2px); } 75% { transform: translateX(2px); } }

      .num { font-family: "Nunito"; font-weight: 900; font-size: 4px;
        text-anchor: middle; dominant-baseline: central; pointer-events: none;
        fill: var(--ink);
      }
      .num.done { fill: #fff; }
      .num.next { fill: var(--orange-shadow); }

      .seg { stroke: var(--green); stroke-width: 0.9; stroke-linecap: round; fill: none; opacity: 0.9; }
      .pic { transition: opacity .55s ease; }

      footer { display: flex; gap: 12px; justify-content: center; padding: 12px; border-top: 2px solid var(--grey); margin-top: auto; }
      button {
        font: inherit; font-weight: 800; font-size: 15px;
        letter-spacing: .8px; text-transform: uppercase;
        padding: 12px 22px; border: none; border-radius: 14px;
        background: var(--green); color: #fff;
        box-shadow: 0 4px 0 var(--green-shadow); cursor: pointer;
      }
      button:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--green-shadow); }
      button.secondary { background: #fff; color: var(--blue); border: 2px solid var(--grey); box-shadow: 0 4px 0 var(--grey); }
      button.secondary:active { box-shadow: 0 2px 0 var(--grey); }

      .more-games { margin: 12px 0 4px; text-align: center; color: #777; font-size: 14px; font-weight: 700; }
      .more-games a { color: var(--blue); border-bottom: 2px solid var(--blue); text-decoration: none; padding-bottom: 1px; }

      .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; animation: fadein .25s ease; }
      .overlay.hidden { display: none; }
      .overlay-card { background: #fff; border-radius: 24px; padding: 32px 28px; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 12px 40px rgba(0,0,0,.25); animation: pop-in .4s ease; }
      @keyframes pop-in { 0% { transform: scale(.7); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
      @keyframes fadein { 0% { opacity: 0; } 100% { opacity: 1; } }
      .big-emoji { font-size: 72px; margin-bottom: 8px; }
      .overlay-card h2 { margin: 0 0 12px; font-size: 22px; font-weight: 900; }
      .overlay-card .sub { font-size: 18px; color: #666; font-weight: 800; margin-bottom: 16px; }
      .overlay-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 14px; }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>✨ Connect the Dots</h1>
        <div id="themeTitle" class="sub">Tap dots in order: 1, 2, 3…</div>
        <div id="stars"></div>
      </header>
      <div class="stage">
        <svg id="board" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
      <footer>
        <button id="reset">↺ New game</button>
      </footer>
      <p class="more-games">Try other games at <a href="/kid-games/">ashoktak.com/kid-games</a> 🎈</p>
      <div id="roundOverlay" class="overlay hidden">
        <div class="overlay-card">
          <div class="big-emoji" id="roundEmoji">✨</div>
          <h2 id="roundLabel">Round 1</h2>
          <div class="sub" id="roundTheme"></div>
        </div>
      </div>
      <div id="finishOverlay" class="overlay hidden">
        <div class="overlay-card">
          <div class="big-emoji">🎉</div>
          <h2>Yay! You connected them all!</h2>
          <div class="overlay-buttons">
            <button id="overlayAgain">↺ Play again</button>
            <button id="overlayMore" class="secondary">🎈 More games</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module">
      const SVGNS = "http://www.w3.org/2000/svg";

      function starDots() {
        const out = [];
        for (let i = 0; i < 10; i++) {
          const a = (i * Math.PI) / 5 - Math.PI / 2;
          const r = i % 2 === 0 ? 38 : 17;
          out.push([50 + Math.cos(a) * r, 50 + Math.sin(a) * r]);
        }
        return out;
      }

      const PICTURES = [
        {
          name: "House", emoji: "🏠", speech: "It's a house!",
          fill: "#ff9600", outline: "#cc6f00",
          dots: [[20,85],[80,85],[80,55],[90,55],[50,22],[10,55],[20,55]],
        },
        {
          name: "Star", emoji: "⭐", speech: "It's a star!",
          fill: "#ffc800", outline: "#cc9c00",
          dots: starDots(),
        },
        {
          name: "Fish", emoji: "🐟", speech: "It's a fish!",
          fill: "#1cb0f6", outline: "#1480b8",
          dots: [[18,32],[40,50],[18,68],[60,75],[85,50],[60,25]],
        },
        {
          name: "Tree", emoji: "🌲", speech: "It's a tree!",
          fill: "#58cc02", outline: "#3f9300",
          dots: [[50,12],[80,70],[60,70],[60,90],[40,90],[40,70],[20,70]],
        },
        {
          name: "Apple", emoji: "🍎", speech: "It's an apple!",
          fill: "#ff4b4b", outline: "#cc3030",
          dots: [[50,82],[72,72],[84,52],[74,30],[55,24],[45,24],[26,30],[16,52],[28,72]],
        },
        {
          name: "Boat", emoji: "⛵", speech: "It's a boat!",
          fill: "#ce82ff", outline: "#9a52cc",
          dots: [[10,65],[90,65],[78,85],[22,85]],
        },
      ];

      const board = document.getElementById("board");
      const starsEl = document.getElementById("stars");
      const themeTitle = document.getElementById("themeTitle");
      const roundOverlay = document.getElementById("roundOverlay");
      const roundLabel = document.getElementById("roundLabel");
      const roundTheme = document.getElementById("roundTheme");
      const roundEmoji = document.getElementById("roundEmoji");
      const finishOverlay = document.getElementById("finishOverlay");

      const TOTAL_ROUNDS = 5;
      let order = [];
      let roundIdx = 0;
      let nextDot = 1;
      let pic;
      let lockBoard = false;

      function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

      let speechReady = false;
      function primeSpeech() { if (speechReady) return; speechReady = true; try { const u = new SpeechSynthesisUtterance(""); u.volume = 0; speechSynthesis.speak(u); } catch {} }
      function speak(t) { try { const u = new SpeechSynthesisUtterance(t); u.lang = "en-US"; u.rate = 0.9; u.pitch = 1.2; speechSynthesis.cancel(); speechSynthesis.speak(u); } catch {} }
      let actx = null;
      function beep(f) { try { actx ??= new AudioContext(); const o = actx.createOscillator(); const g = actx.createGain(); o.frequency.value = f; o.type = "sine"; g.gain.value = 0.08; o.connect(g).connect(actx.destination); o.start(); g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + 0.25); o.stop(actx.currentTime + 0.26); } catch {} }

      function startGame() {
        order = shuffle(PICTURES.map((_, i) => i)).slice(0, TOTAL_ROUNDS);
        roundIdx = 0;
        showRoundIntro();
      }

      function showRoundIntro() {
        pic = PICTURES[order[roundIdx]];
        roundLabel.textContent = `Round ${roundIdx + 1} of ${order.length}`;
        roundTheme.textContent = `${pic.emoji} ${pic.name}`;
        roundEmoji.textContent = pic.emoji;
        finishOverlay.classList.add("hidden");
        roundOverlay.classList.remove("hidden");
        speak(`Round ${roundIdx + 1}. Connect the dots!`);
        setTimeout(() => { roundOverlay.classList.add("hidden"); loadRound(); }, 1700);
      }

      function loadRound() {
        themeTitle.textContent = `Tap dots in order to draw a ${pic.name.toLowerCase()}`;
        starsEl.textContent = `Round ${roundIdx + 1} / ${order.length}`;
        nextDot = 1;
        lockBoard = false;
        board.innerHTML = "";
        // Reserve a back-most slot for the eventual filled picture (not added yet).
        pic.dots.forEach((d, i) => {
          const c = document.createElementNS(SVGNS, "circle");
          c.setAttribute("cx", d[0]);
          c.setAttribute("cy", d[1]);
          c.setAttribute("r", 4.4);
          c.setAttribute("class", "dot" + (i === 0 ? " next" : ""));
          c.dataset.idx = String(i + 1);
          c.addEventListener("click", () => onDot(i + 1, c));
          board.appendChild(c);

          const t = document.createElementNS(SVGNS, "text");
          t.setAttribute("x", d[0]);
          t.setAttribute("y", d[1]);
          t.setAttribute("class", "num" + (i === 0 ? " next" : ""));
          t.dataset.idx = String(i + 1);
          t.textContent = String(i + 1);
          board.appendChild(t);
        });
      }

      function onDot(num, el) {
        primeSpeech();
        if (lockBoard) return;
        if (num !== nextDot) {
          el.classList.add("shake");
          beep(220);
          setTimeout(() => el.classList.remove("shake"), 380);
          return;
        }
        // Mark this dot done.
        el.classList.remove("next");
        el.classList.add("done");
        document.querySelectorAll(`.num[data-idx="${num}"]`).forEach((t) => {
          t.classList.remove("next");
          t.classList.add("done");
        });
        beep(660 + num * 30);

        // Draw line from previous dot.
        if (num > 1) {
          const prev = pic.dots[num - 2];
          const cur = pic.dots[num - 1];
          drawSeg(prev, cur);
        }

        // Promote next dot, or finish round.
        if (num >= pic.dots.length) {
          // Close the shape back to dot 1.
          drawSeg(pic.dots[pic.dots.length - 1], pic.dots[0]);
          lockBoard = true;
          setTimeout(() => fillPicture(), 350);
        } else {
          nextDot = num + 1;
          const nextEl = document.querySelector(`.dot[data-idx="${nextDot}"]`);
          if (nextEl) nextEl.classList.add("next");
          const nextText = document.querySelector(`.num[data-idx="${nextDot}"]`);
          if (nextText) nextText.classList.add("next");
        }
      }

      function drawSeg(a, b) {
        const ln = document.createElementNS(SVGNS, "line");
        ln.setAttribute("x1", a[0]); ln.setAttribute("y1", a[1]);
        ln.setAttribute("x2", b[0]); ln.setAttribute("y2", b[1]);
        ln.setAttribute("class", "seg");
        // Insert behind dots (at start of children).
        board.insertBefore(ln, board.firstChild);
      }

      function fillPicture() {
        const path = document.createElementNS(SVGNS, "path");
        const d = "M " + pic.dots.map((p) => `${p[0]} ${p[1]}`).join(" L ") + " Z";
        path.setAttribute("d", d);
        path.setAttribute("fill", pic.fill);
        path.setAttribute("stroke", pic.outline);
        path.setAttribute("stroke-width", "1.2");
        path.setAttribute("stroke-linejoin", "round");
        path.setAttribute("class", "pic");
        path.style.opacity = "0";
        board.insertBefore(path, board.firstChild);
        requestAnimationFrame(() => { path.style.opacity = "1"; });
        starsEl.textContent = "⭐⭐⭐";
        beep(880);
        speak(pic.speech);

        const isLast = roundIdx >= order.length - 1;
        if (isLast) {
          setTimeout(() => {
            finishOverlay.classList.remove("hidden");
            speak("Yay! You connected them all!");
          }, 2000);
        } else {
          setTimeout(() => { roundIdx++; showRoundIntro(); }, 2200);
        }
      }

      document.getElementById("reset").addEventListener("click", () => { primeSpeech(); startGame(); });
      document.getElementById("overlayAgain").addEventListener("click", () => { primeSpeech(); startGame(); });
      document.getElementById("overlayMore").addEventListener("click", () => { location.href = "/kid-games/"; });

      startGame();
    </script>
  </body>
</html>
